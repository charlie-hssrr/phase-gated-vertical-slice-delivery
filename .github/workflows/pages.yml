name: Deploy workflow schematic to GitHub Pages

# Publishes docs/ to GitHub Pages. The site root serves the visual
# workflow schematic (docs/workflow.html), so the link is shareable.
#
# One-time setup: in the repo, go to Settings → Pages and set
# "Build and deployment → Source" to "GitHub Actions". This workflow
# then deploys on every push to main that touches docs/.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r docs/. _site/
          # Serve the schematic at the site root.
          cp docs/workflow.html _site/index.html
          # Skip Jekyll processing; serve files as-is.
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
